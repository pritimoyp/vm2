services:
  mysql:
    image: mysql:8.3
    container_name: cyberwise-mysql
    restart: unless-stopped
    env_file: .env
    ports:
      - "3306:3306"
    volumes:
      - /data/mysql:/var/lib/mysql
      - ./init-db:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: cyberwise-minio
    restart: unless-stopped
    env_file: .env
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - /data/minio:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
